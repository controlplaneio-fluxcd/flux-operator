apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: 1h
spec:
  distribution:
    version: "2.x"
    registry: ghcr.io/fluxcd
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
    - source-watcher
  cluster:
    type: kubernetes
    multitenant: true
    tenantDefaultServiceAccount: flux
    networkPolicy: true
    domain: cluster.local
  sync:
    kind: GitRepository
    url: https://github.com/controlplaneio-fluxcd/flux-operator.git
    ref: refs/heads/main
    path: config/terraform/clusters/staging
    # pullSecret: flux-system # Uncomment if using GitHub App authentication with a private repository.
  kustomize:
    patches:
      - target:
          kind: Deployment
        patch: |
          - op: add
            path: /metadata/annotations/cluster-region
            value: ${CLUSTER_REGION}
      - target:
          kind: Kustomization
          name: flux-system
        patch: |
          - op: add
            path: /spec/postBuild
            value:
              substituteFrom:
                - kind: ConfigMap
                  name: flux-runtime-info
