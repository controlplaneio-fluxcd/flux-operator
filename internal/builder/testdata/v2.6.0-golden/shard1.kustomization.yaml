---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system
resources:
  - ../source-controller.yaml
  - ../kustomize-controller.yaml
  - ../helm-controller.yaml
  - ../image-reflector-controller.yaml
  - ../image-automation-controller.yaml
  - pvc.yaml
nameSuffix: "-shard1"
commonAnnotations:
  sharding.fluxcd.io/role: "shard"
patches:
  - target:
      kind: (Namespace|CustomResourceDefinition|ClusterRole|ClusterRoleBinding|ServiceAccount|NetworkPolicy|ResourceQuota)
    patch: |
      apiVersion: v1
      kind: all
      metadata:
        name: all
      $patch: delete
  - target:
      kind: Service
      name: (source-controller)
    patch: |
      - op: replace
        path: /spec/selector/app
        value: source-controller-shard1
  - target:
      kind: Deployment
      name: (source-controller)
    patch: |
      - op: replace
        path: /spec/selector/matchLabels/app
        value: source-controller-shard1
      - op: replace
        path: /spec/template/metadata/labels/app
        value: source-controller-shard1
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --storage-adv-addr=source-controller-shard1.$(RUNTIME_NAMESPACE).svc.cluster.local.
      - op: replace
        path: /spec/template/spec/volumes/0
        value:
          name: persistent-data-shard1
          persistentVolumeClaim:
            claimName: source-controller-shard1
      - op: replace
        path: /spec/template/spec/containers/0/volumeMounts/0
        value:
          name: persistent-data-shard1
          mountPath: /data
  - target:
      kind: Deployment
      name: (kustomize-controller)
    patch: |
      - op: replace
        path: /spec/selector/matchLabels/app
        value: kustomize-controller-shard1
      - op: replace
        path: /spec/template/metadata/labels/app
        value: kustomize-controller-shard1
  - target:
      kind: Deployment
      name: (helm-controller)
    patch: |
      - op: replace
        path: /spec/selector/matchLabels/app
        value: helm-controller-shard1
      - op: replace
        path: /spec/template/metadata/labels/app
        value: helm-controller-shard1
  - target:
      kind: Deployment
      name: (image-reflector-controller)
    patch: |
      - op: replace
        path: /spec/selector/matchLabels/app
        value: image-reflector-controller-shard1
      - op: replace
        path: /spec/template/metadata/labels/app
        value: image-reflector-controller-shard1
  - target:
      kind: Deployment
      name: (image-automation-controller)
    patch: |
      - op: replace
        path: /spec/selector/matchLabels/app
        value: image-automation-controller-shard1
      - op: replace
        path: /spec/template/metadata/labels/app
        value: image-automation-controller-shard1
  - target:
      kind: Deployment
      name: (source-controller|kustomize-controller|helm-controller|image-reflector-controller|image-automation-controller)
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --watch-label-selector=sharding.fluxcd.io/key=shard1
