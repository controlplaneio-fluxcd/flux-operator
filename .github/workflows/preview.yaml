name: preview
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}-preview

jobs:
  branch-build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Build frontend
        run: make web-ci-install web-build
      - name: Upload frontend assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist-${{ github.sha }}
          path: web/dist/
          retention-days: 1
          if-no-files-found: error
  branch-build-push:
    needs: [branch-build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for creating OIDC tokens for signing.
      packages: write # for pushing and signing container images.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x
      - name: Download frontend assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist-${{ github.sha }}
          path: web/dist/
      - name: Prepare
        id: prep
        run: |
          TIMESTAMP=$(git log -1 --pretty=%ct)
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}-1"
            TAG="${GITHUB_REF_NAME}"
            BRANCH_BUILD=false
          else
            TAG="${GITHUB_REF_NAME//\//-}-${GITHUB_SHA::8}-${TIMESTAMP}"
            LATEST_TAG="${GITHUB_REF_NAME//\//-}-latest"
            VERSION="0.0.0-${TAG}"
            BRANCH_BUILD=true
          fi

          {
            echo "VERSION=${VERSION}"
            echo "TAG=${TAG}"
            echo "LATEST_TAG=${LATEST_TAG}"
            echo "BRANCH_BUILD=${BRANCH_BUILD}"
          } >> $GITHUB_OUTPUT
      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Setup Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.IMAGE }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.TAG }}
            type=raw,value=${{ steps.prep.outputs.LATEST_TAG }},enable=${{ steps.prep.outputs.BRANCH_BUILD == 'true' }}
          annotations:
            org.opencontainers.image.description=Flux Operator preview build
      - name: Push image
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        env:
          SOURCE_DATE_EPOCH: ${{ steps.prep.outputs.TIMESTAMP }}
        with:
          sbom: true
          provenance: true
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          build-args: "VERSION=${{ steps.prep.outputs.VERSION }}"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: 1
          IMAGE_DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${IMAGE_DIGEST}"
